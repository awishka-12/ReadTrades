<!-- authors.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Author Management - ReadTrade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="admin-container">
    <!-- Same sidebar as other pages -->

    <main class="main-content">
        <header class="main-header">
            <h1><i class="fas fa-user-edit"></i> Author Management</h1>
            <button class="btn btn-primary" onclick="openAddAuthorModal()">
                <i class="fas fa-plus"></i> Add New Author
            </button>
        </header>

        <div class="authors-table">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Biography</th>
                    <th>Number of Books</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="authorsTableBody">
                <!-- Authors loaded dynamically -->
                </tbody>
            </table>
        </div>
    </main>
</div>

<!-- Add Author Modal -->
<div id="addAuthorModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Add New Author</h3>
            <span class="close" onclick="closeModal('addAuthorModal')">&times;</span>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>Author Name *</label>
                <input type="text" id="authorName" placeholder="Enter full name">
            </div>
            <div class="form-group">
                <label>Biography</label>
                <textarea id="authorBio" rows="4" placeholder="Author biography..."></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('addAuthorModal')">Cancel</button>
            <button class="btn btn-primary" onclick="saveAuthor()">Save Author</button>
        </div>
    </div>
</div>


</body>
</html>
