<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadTrade | My Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/vendor/my-orders.css">
</head>
<body>
<!-- Header Component -->
<header-content></header-content>

<div class="my-orders-container">
    <div class="container">
        <!-- Page Header -->
        <div class="page-header">
            <div class="header-content">
                <h1><i class="fas fa-shopping-bag"></i> My Orders</h1>
                <p>Track and manage all your book purchases</p>
            </div>
        </div>

        <!-- Summary Cards -->
        <div class="summary-cards">
            <div class="summary-card">
                <div class="card-icon bg-primary">
                    <i class="fas fa-box"></i>
                </div>
                <div class="card-info">
                    <h3 id="totalOrders">0</h3>
                    <p>Total Orders</p>
                </div>
            </div>
            <div class="summary-card">
                <div class="card-icon bg-success">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div class="card-info">
                    <h3 id="deliveredOrders">0</h3>
                    <p>Delivered</p>
                </div>
            </div>
            <div class="summary-card">
                <div class="card-icon bg-warning">
                    <i class="fas fa-spinner"></i>
                </div>
                <div class="card-info">
                    <h3 id="pendingOrders">0</h3>
                    <p>In Progress</p>
                </div>
            </div>
            <div class="summary-card">
                <div class="card-icon bg-danger">
                    <i class="fas fa-rupee-sign"></i>
                </div>
                <div class="card-info">
                    <h3 id="totalSpent">Rs. 0</h3>
                    <p>Total Spent</p>
                </div>
            </div>
        </div>

        <!-- Orders Table -->
        <div class="orders-table-container">
            <div class="table-header">
                <h3><i class="fas fa-history"></i> Order History</h3>
                <div class="table-controls">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchOrder" placeholder="Search by Order ID...">
                    </div>
                    <select id="filterStatus" class="filter-select">
                        <option value="all">All Orders</option>
                        <option value="delivered">Delivered</option>
                        <option value="pending">Pending</option>
                        <option value="processing">Processing</option>
                        <option value="shipped">Shipped</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
            </div>

            <div class="table-responsive">
                <table class="orders-table" id="ordersTable">
                    <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Date</th>
                        <th>Items</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody id="ordersTableBody">
                    <!-- Orders will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Order Details Modal -->
<div class="modal-overlay" id="orderModal">
    <div class="order-modal">
        <div class="modal-header">
            <div class="modal-title">
                <i class="fas fa-receipt"></i>
                <h3>Order Details</h3>
            </div>
            <button class="modal-close" onclick="closeOrderModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body" id="orderModalBody">
            <!-- Order details will be loaded here -->
        </div>
    </div>
</div>

<!-- Footer Component -->


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/header.js"></script>
<script src="assets/js/footer.js"></script>
<script src="assets/js/my-orders.js"></script>
</body>
</html>
